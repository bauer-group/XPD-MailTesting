# =============================================================================
# Mailpit — local mail-testing stack (BAUER GROUP)
# =============================================================================
# A mail sink your applications send to instead of a real mail server. Catches
# everything, sends nothing. Web UI + REST API on 8025, SMTP on 1025, POP3 on
# 1110. TLS (STARTTLS) works out of the box — see README.md.
#
#   docker compose up -d   →   http://localhost:8025
#   docker compose pull    →   update to the latest Mailpit
# =============================================================================
name: mailpit

services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    restart: unless-stopped
    ports:
      - "${MP_UI_PORT:-8025}:8025"    # Web UI + REST API
      - "${MP_SMTP_PORT:-1025}:1025"  # SMTP — plain + STARTTLS (implicit TLS via toggle below)
      - "${MP_POP3_PORT:-1110}:1110"  # POP3 — inert until MP_POP3_AUTH is set
    environment:
      MP_DATABASE: /data/mailpit.db
      MP_MAX_MESSAGES: "5000"
      MP_SMTP_AUTH_ACCEPT_ANY: "true"                          # accept any SMTP login — your app config just works
      MP_SMTP_AUTH_ALLOW_INSECURE: ${MP_SMTP_AUTH_ALLOW_INSECURE:-true}  # allow auth without TLS (set false for SMTPS)
      # Self-signed cert generated by Mailpit itself (regenerated each restart) →
      # STARTTLS works on the SMTP port with no certificate setup.
      MP_SMTP_TLS_CERT: sans:localhost,127.0.0.1,::1,mailpit,host.docker.internal
      MP_SMTP_TLS_KEY: sans:localhost,127.0.0.1,::1,mailpit,host.docker.internal
      # Optional toggles — inert unless set in .env (see .env.example).
      MP_SMTP_REQUIRE_TLS: ${MP_SMTP_REQUIRE_TLS:-}  # true = implicit TLS (SMTPS); also set ALLOW_INSECURE=false
      MP_UI_AUTH: ${MP_UI_AUTH:-}                    # "user:pass" → basic auth on UI/API
      MP_POP3_AUTH: ${MP_POP3_AUTH:-}                # "user:pass" → enables POP3
    volumes:
      - mailpit-data:/data

volumes:
  mailpit-data:
